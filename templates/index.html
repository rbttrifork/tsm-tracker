<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSM Price Tracker - Spineshatter</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>TSM Price Tracker</h1>
            <span class="realm">Spineshatter - Horde (EU-Fresh)</span>
        </div>
        <div class="header-right">
            {% if deployment_mode == 'local' %}
            <button id="btn-collect" onclick="collectSnapshot()">Collect Snapshot</button>
            {% endif %}
            <span id="stats-info"></span>
        </div>
    </header>

    <!-- Market Pulse -->
    <div id="market-pulse" class="market-pulse">
        <div class="pulse-content">
            <span class="pulse-label">Market Pulse</span>
            <div class="pulse-stats">
                <span class="pulse-above" id="pulse-above"></span>
                <span class="pulse-normal" id="pulse-normal"></span>
                <span class="pulse-below" id="pulse-below"></span>
            </div>
            <div class="pulse-bar" id="pulse-bar"></div>
        </div>
    </div>

    <main>
        <!-- Side-by-side Recommendations -->
        <div class="recommendations-grid">
            <section class="rec-panel">
                <h2 class="section-title buy-title">Buy Low</h2>
                <div id="recommendations-list"></div>
            </section>
            <section class="rec-panel">
                <h2 class="section-title sell-title">Sell High</h2>
                <div id="sell-recommendations-list"></div>
            </section>
        </div>

        <!-- Market Movers -->
        <section class="market-movers">
            <h2 class="section-title movers-title">Market Movers</h2>
            <div class="movers-grid" id="movers-grid"></div>
        </section>

        <!-- All Items (collapsible) -->
        <section id="items-section">
            <h2 class="section-title items-title collapsible" onclick="toggleItems()">
                <span id="items-toggle-arrow">&#9660;</span>
                All Items <span id="items-count" class="section-count"></span>
            </h2>
            <div id="items-collapsible">
                <div class="category-tabs">
                    <button class="tab active" data-category="all" onclick="filterCategory('all')">All</button>
                    {% for cat_id, cat_name in categories %}
                    <button class="tab" data-category="{{ cat_id }}" onclick="filterCategory('{{ cat_id }}')">{{ cat_name }}</button>
                    {% endfor %}
                </div>
                <div id="item-grid"></div>
            </div>
        </section>

        <!-- Price Chart Modal -->
        <div id="chart-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="chart-title">Item Price History</h2>
                    <div class="chart-controls">
                        <select id="chart-days" onchange="reloadChart()">
                            <option value="7">7 days</option>
                            <option value="14">14 days</option>
                            <option value="30" selected>30 days</option>
                            <option value="60">60 days</option>
                        </select>
                        <button class="close-btn" onclick="closeChart()">&times;</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="price-chart"></canvas>
                </div>
                <div id="dow-chart-container">
                    <h3>Average Price by Day of Week</h3>
                    <canvas id="dow-chart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        window.RAID_DAYS = {{ raid_days | tojson }};
    </script>
</body>
</html>
